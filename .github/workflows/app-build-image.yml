name: Techvision Mail - Build & Push Image

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mehariwamlake/mail
  FRAPPE_REF: version-16
  NODE_VERSION: 18.18.2
  PYTHON_VERSION: 3.11.6
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ----------------------------
      # 1. Checkout repo
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Setup Buildx
      # ----------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ----------------------------
      # 3. Login to GHCR
      # ----------------------------
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # ----------------------------
      # 4. Create apps.json (FIXED LOCATION)
      # ----------------------------
      - name: Create apps.json
        run: |
          mkdir -p /opt/frappe/

          cat > /opt/frappe/apps.json <<EOF
          [
            {
              "url": "https://github.com/frappe/frappe",
              "branch": "${{ env.FRAPPE_REF }}"
            },
            {
              "url": "https://github.com/frappe/erpnext",
              "branch": "${{ env.FRAPPE_REF }}"
            },
            {
              "url": "https://github.com/Mehariwamlake/mail",
              "branch": "develop"
            }
          ]
          EOF

      # ----------------------------
      # 5. Build test image (NO PUSH)
      # ----------------------------
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/layered/Containerfile
          load: true
          platforms: linux/amd64
          tags: local/mail:test
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=${{ env.FRAPPE_REF }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}

      # ----------------------------
      # 6. Smoke test
      # ----------------------------
      - name: Smoke test container
        run: |
          docker run --rm local/mail:test bash -lc "
            set -e

            echo '=== Installed apps ==='
            bench list-apps || true

            echo '=== Apps folder ==='
            ls -la /home/frappe/frappe-bench/apps || true

            echo '=== Checking mail app ==='
            bench list-apps | grep -i mail || echo 'mail not installed'
          "

      # ----------------------------
      # 7. Build & PUSH production image
      # ----------------------------
      - name: Build and Push Production Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/layered/Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=${{ env.FRAPPE_REF }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}