version: "3.9"

x-frappe-image: &frappe
  image: ${IMAGE_NAME:-docker.io/frappe/erpnext}:${VERSION:-version-15}
  restart: always

services:
  backend:
    <<: *frappe
    command: bench start
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  frontend:
    <<: *frappe
    command: nginx-entrypoint.sh
    depends_on:
      - backend
      - websocket
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
    volumes:
      - sites:/home/frappe/frappe-bench/sites

    # ✅ expose 8082 externally
    ports:
      - "8082:8080"

    networks:
      - bench
      - dokploy-network

    labels:
      - traefik.enable=true

      # HTTP
      - traefik.http.routers.erp.rule=Host(`${SITE_NAME}`)
      - traefik.http.routers.erp.entrypoints=web
      - traefik.http.routers.erp.middlewares=redirect-to-https@file

      # HTTPS
      - traefik.http.routers.erp-secure.rule=Host(`${SITE_NAME}`)
      - traefik.http.routers.erp-secure.entrypoints=websecure
      - traefik.http.routers.erp-secure.tls.certresolver=letsencrypt

      # ✅ ALWAYS internal port
      - traefik.http.services.erp.loadbalancer.server.port=8080

  websocket:
    <<: *frappe
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  scheduler:
    <<: *frappe
    command: bench schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  worker-default:
    <<: *frappe
    command: bench worker --queue default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  worker-short:
    <<: *frappe
    command: bench worker --queue short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  worker-long:
    <<: *frappe
    command: bench worker --queue long
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  configurator:
    <<: *frappe
    restart: "no"
    entrypoint: bash -c
    command: >
      bench set-config -g db_host db;
      bench set-config -g redis_cache "redis://redis-cache:6379";
      bench set-config -g redis_queue "redis://redis-queue:6379";
      bench set-config -g redis_socketio "redis://redis-queue:6379";
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  create-site:
    <<: *frappe
    restart: "no"
    entrypoint: bash -c
    command: >
      sleep 15 &&
      if [ ! -d "sites/${SITE_NAME}" ]; then
        bench new-site ${SITE_NAME}
        --admin-password=${ADMIN_PASSWORD}
        --db-root-password=${DB_ROOT_PASSWORD}
        --install-app erpnext;
      fi
    environment:
      SITE_NAME: ${SITE_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench

  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - bench

  redis-cache:
    image: redis:6.2-alpine
    restart: always
    networks:
      - bench

  redis-queue:
    image: redis:6.2-alpine
    restart: always
    networks:
      - bench

volumes:
  db-data:
  sites:

networks:
  bench:
  dokploy-network:
    external: true