services:
  backend:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}


  configurator:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: "no"
    networks:
      - frappe_network
    entrypoint: ["bash", "-c"]
    command: >
      ls -1 apps > sites/apps.txt;
      bench set-config -g db_host $$DB_HOST;
      bench set-config -gp db_port $$DB_PORT;
      bench set-config -g redis_socketio "redis://$$REDIS_CACHE";
      bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}
      SOCKETIO_PORT: ${SOCKETIO_PORT}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs


  db:
    image: mariadb:10.8
    restart: always
    networks:
      - frappe_network
    healthcheck:
      test: mysqladmin ping -h localhost --password=${MYSQL_ROOT_PASSWORD}
      interval: 5s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
        # 🔥 PERFORMANCE TUNING
      - --innodb-buffer-pool-size=2G
      - --innodb-log-file-size=256M
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-file-per-table=1
      - --max-connections=500
      - --query-cache-size=64M
      - --query-cache-type=1
      - --table-open-cache=400

      - --tmp-table-size=128M
      - --max-heap-table-size=128M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    depends_on:
      - websocket
    networks:
      - frappe_network
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: ${BACKEND}
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER}
      SOCKETIO: websocket:${SOCKETIO_PORT}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"

  queue-short-1:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}

  queue-short-2:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}

  queue-default:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}

  queue-long:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "long"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}

  redis-queue:
    image: redis:6.2-alpine
    restart: always
    networks:
      - frappe_network
    volumes:
      - redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  redis-cache:
    image: redis:6.2-alpine
    restart: always
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  redis-socketio:
    deploy:
      restart_policy:
        condition: always
    image: redis:6.2-alpine
    volumes:
      - redis-socketio-data:/data
    networks:
      - frappe_network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 3

  scheduler:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    command: ["bench", "schedule"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: ghcr.io/mehariwamlake/techvision-erp:1.0.1
    restart: always
    networks:
      - frappe_network
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
        REDIS_CACHE: ${REDIS_CACHE}
        REDIS_QUEUE: ${REDIS_QUEUE}
        REDIS_SOCKETIO: ${REDIS_SOCKETIO}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-socketio:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - wait-for-it
        - '0.0.0.0:9000'
      interval: 2s
      timeout: 10s
      retries: 30
    ports:
    - "9000:9000"


volumes:
  db-data:
  redis-queue-data:
  redis-socketio-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge