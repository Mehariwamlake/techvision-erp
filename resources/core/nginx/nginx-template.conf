upstream backend-server {
	server ${BACKEND} fail_timeout=0;
}

upstream socketio-server {
	server ${SOCKETIO} fail_timeout=0;
}

# Parse forwarded protocol
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
	default $scheme;
	https https;
}

server {
	listen 8080;
	server_name _;

	absolute_redirect off;

	root /home/frappe/frappe-bench/sites;

	proxy_buffer_size 128k;
	proxy_buffers 4 256k;
	proxy_busy_buffers_size 256k;

	include /etc/nginx/snippets/security_headers.conf;

	set_real_ip_from ${UPSTREAM_REAL_IP_ADDRESS};
	real_ip_header ${UPSTREAM_REAL_IP_HEADER};
	real_ip_recursive ${UPSTREAM_REAL_IP_RECURSIVE};

	# =========================
	# STATIC ASSETS
	# =========================

	location /assets {
		try_files $uri =404;
	}

	# =========================
	# PROTECTED FILES
	# =========================

	location ~ ^/protected/(.*) {
		internal;
		try_files /$host/$1 =404;
	}

	# =========================
	# SOCKET.IO
	# =========================

	location /socket.io {

		proxy_http_version 1.1;

		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";

		proxy_set_header Host $host;

		proxy_set_header X-Frappe-Site-Name $host;

		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

		proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

		proxy_set_header Origin $scheme://$host;

		proxy_pass http://socketio-server;
	}

	# =========================
	# MAIN ROUTING
	# =========================

	location / {

		rewrite ^(.+)/$ $1 permanent;
		rewrite ^(.+)/index\.html$ $1 permanent;
		rewrite ^(.+)\.html$ $1 permanent;

		location ~ ^/files/.*\.(htm|html|svg|xml)$ {

			include /etc/nginx/snippets/security_headers.conf;

			add_header Content-Disposition "attachment";

			try_files /$host/public/$uri @webserver;
		}

		try_files /$host/public/$uri @webserver;
	}

	# =========================
	# BACKEND
	# =========================

	location @webserver {

		proxy_http_version 1.1;

		proxy_set_header Host $host;

		proxy_set_header X-Frappe-Site-Name $host;

		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

		proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

		proxy_set_header X-Use-X-Accel-Redirect True;

		proxy_read_timeout ${PROXY_READ_TIMEOUT};

		proxy_redirect off;

		proxy_pass http://backend-server;
	}

	# =========================
	# PERFORMANCE
	# =========================

	sendfile on;

	keepalive_timeout 15;

	client_max_body_size ${CLIENT_MAX_BODY_SIZE};

	client_body_buffer_size 16K;

	client_header_buffer_size 1k;

	# =========================
	# GZIP
	# =========================

	gzip on;

	gzip_http_version 1.1;

	gzip_comp_level 5;

	gzip_min_length 256;

	gzip_proxied any;

	gzip_vary on;

	gzip_types
		application/atom+xml
		application/javascript
		application/json
		application/rss+xml
		application/vnd.ms-fontobject
		application/x-font-ttf
		application/font-woff
		application/x-web-app-manifest+json
		application/xhtml+xml
		application/xml
		font/opentype
		image/svg+xml
		image/x-icon
		text/css
		text/plain
		text/x-component;
}